name: Sync to Hugging Face
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action"
          
          # 1. समस्या वाली इमेजेज को वर्किंग फोल्डर से पूरी तरह हटा दें
          rm -rf docs/images/
          
          # 2. एक बिल्कुल नई ब्रांच (hf-deploy) बनाएं, जिसमें कोई पुरानी हिस्ट्री न हो
          git checkout --orphan hf-deploy
          
          # 3. सिर्फ मौजूदा साफ फाइलों को जोड़ें
          git add .
          git commit -m "Clean deploy to Hugging Face without LFS history"
          
          # 4. इस साफ ब्रांच को हगिंग फेस के main पर जबरदस्ती (force) डाल दें
          git push -f https://oauth2:$HF_TOKEN@huggingface.co/spaces/Veda-Labs/Vedika-gen-2.0-img-gen hf-deploy:main
