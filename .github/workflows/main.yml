name: Sync to Hugging Face
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action"
          # हगिंग फेस से फाइलें फेच करें
          git remote add hf https://oauth2:$HF_TOKEN@huggingface.co/spaces/Veda-Labs/Vedika-gen-2.0-img-gen
          git fetch hf main
          # रिमोट फाइलों को मर्ज करें (allow-unrelated-histories ज़रूरी है)
          git merge hf/main --allow-unrelated-histories -m "Merge HF and GitHub"
          # अब पुश करें
          git push https://oauth2:$HF_TOKEN@huggingface.co/spaces/Veda-Labs/Vedika-gen-2.0-img-gen main
